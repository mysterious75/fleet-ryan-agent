version: "3.8"

services:
  # ========== PostgreSQL Database ==========
  postgres:
    image: postgres:16-alpine
    container_name: fleet-ryan-db
    environment:
      POSTGRES_DB: fleetryan
      POSTGRES_USER: fleetryan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleetryan123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetryan -d fleetryan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: fleet-ryan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== FastAPI Backend ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-ryan-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./agent-workspace:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ========== Celery Worker ==========
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-ryan-celery-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./agent-workspace:/workspace
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ========== Celery Beat (Scheduler) ==========
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-ryan-celery-beat
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./agent-workspace:/workspace
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  # ========== OpenClaw Gateway ==========
  openclaw:
    image: node:22-alpine
    container_name: fleet-ryan-openclaw
    working_dir: /app
    volumes:
      - ./agent-workspace:/app/workspace
      - openclaw_data:/root/.openclaw
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_WORKSPACE=/app/workspace
    command: >
      sh -c "
        npm install -g openclaw@latest &&
        openclaw gateway --port 18789
      "
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  openclaw_data:
